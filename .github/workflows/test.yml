name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: npm test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest exercises the Windows Installer COM tests (MSI
        # property reading) for real; on other platforms those tests skip
        # themselves rather than fail - see test/msi.test.js.
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
